name: CI + GitOps update

on:
  push:
    branches: [main]
    paths: ['src/**']

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update image tag in repo
        run: |
          sed -i \
            "s|image: gcr.io/google-samples/gb-frontend:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" \
            apps/guestbook/deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add apps/guestbook/deployment.yaml
          git commit -m "ci: update image to ${{ github.sha }}"
          git push